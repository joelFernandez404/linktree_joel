<!DOCTYPE html>

<title>Linktree Joel Fernandez</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
    radial-gradient(circle at top right, #1e3a8a 0%, transparent 35%),
    radial-gradient(circle at bottom left, #0f172a 0%, transparent 40%),
    linear-gradient(180deg,#020617,#0b1120,#111827,#0f172a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:430px;
}

.card{
    background:rgba(15,23,42,0.72);
    border:1px solid rgba(96,165,250,0.18);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:28px;
    box-shadow:0 25px 60px rgba(0,0,0,.55);
}

.profile{
    text-align:center;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    overflow:hidden;
    background:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    border:3px solid #3b82f6;
    box-shadow:0 10px 30px rgba(59,130,246,.28);
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

h1{
    margin-top:18px;
    font-size:28px;
    font-weight:800;
    letter-spacing:-0.5px;
}

.role{
    color:#93c5fd;
    margin-top:6px;
    font-size:14px;
}

.desc{
    margin-top:10px;
    color:#cbd5e1;
    font-size:13px;
    line-height:1.5;
}

.links{
    margin-top:28px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.link-btn{
    text-decoration:none;
    background:linear-gradient(135deg,#111827,#1e293b);
    color:#ffffff;
    padding:16px 18px;
    border-radius:18px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:12px;
    transition:0.25s ease;
    border:1px solid rgba(148,163,184,.12);
    box-shadow:0 8px 18px rgba(0,0,0,.30);
}

.link-btn:hover{
    transform:translateY(-2px) scale(1.01);
    background:linear-gradient(135deg,#1d4ed8,#2563eb);
    border-color:rgba(96,165,250,.45);
}

.link-btn span{
    font-size:20px;
}

.footer{
    margin-top:22px;
    text-align:center;
    font-size:12px;
    color:#93c5fd;
}

@media(max-width:480px){
    .card{
        padding:22px;
        border-radius:24px;
    }

    h1{
        font-size:24px;
    }

    .link-btn{
        padding:15px;
        font-size:15px;
    }
}
</style>
</head>

<body>

</div>
</div>
